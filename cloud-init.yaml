#cloud-config

users:
  - name: chris
    groups: [sudo]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOg1rjCzbqTIH85QQOBgrB8Q+saUlKh1s46wOwh5XGKw chris@x1

write_files:
  - path: /etc/profile.d/opt-bin.sh
    content: |
      export PATH="/opt/bin:$PATH"

package_update: true
package_upgrade: true

packages:
  - nvtop

runcmd:
  - mkdir -p /opt/bin
  - curl -fsSL -o /opt/bin/pixi https://github.com/prefix-dev/pixi/releases/download/v0.67.0/pixi-x86_64-unknown-linux-musl
  - chmod +x /opt/bin/pixi
