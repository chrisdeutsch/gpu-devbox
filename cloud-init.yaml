#cloud-config

users:
  - name: chris
    groups: [sudo]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOg1rjCzbqTIH85QQOBgrB8Q+saUlKh1s46wOwh5XGKw chris@x1
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPCPflfD1DwMWCM/XM0dxEbFbwQEFwcZCUuUnKhRi1BJ cdeutsch@cdeutsch-mbp.fritz.box

write_files:
  - path: /etc/profile.d/opt-bin.sh
    content: |
      export PATH="/opt/bin:$PATH"

package_update: true
package_upgrade: true

packages:
  - nvtop

runcmd:
  - mkdir -p /opt/bin
  - |
      set -eu
      pixi_version="v0.67.0"
      pixi_asset="pixi-x86_64-unknown-linux-musl"
      pixi_sha256="512840ad178a65ec7d55001de2a15cbd9c622402901d48eeac6834855c7fb8fe"
      cd /tmp
      curl -fsSL -o "${pixi_asset}" "https://github.com/prefix-dev/pixi/releases/download/${pixi_version}/${pixi_asset}"
      echo "${pixi_sha256}  ${pixi_asset}" | sha256sum -c -
      install -m 0755 "${pixi_asset}" /opt/bin/pixi
      rm -f "${pixi_asset}"
